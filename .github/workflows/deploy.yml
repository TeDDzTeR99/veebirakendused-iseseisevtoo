name: Deploy (Unraid nginx-php-fpm)

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, unraid, docker]

    steps:
      - name: Show runner info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS/arch: $RUNNER_OS / $RUNNER_ARCH"
          docker version
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

      - name: Verify target container is running
        run: |
          CONTAINER="Static_site"
          if ! docker ps --format '{{.Names}}' | grep -qx "$CONTAINER"; then
            echo "ERROR: container '$CONTAINER' is not running"
            exit 1
          fi
          echo "OK: container '$CONTAINER' is running"

      - name: Update site inside container (git pull)
        run: |
          CONTAINER="Static_site"

          docker exec "$CONTAINER" sh -lc '
            set -e

            for d in /var/www/html /var/www /usr/share/nginx/html; do
              if [ -d "$d/.git" ]; then
                echo "Found git repo at: $d"
                cd "$d"
                break
              fi
            done

            if [ ! -d ".git" ]; then
              echo "ERROR: Could not find a .git directory in expected web roots."
              echo "Checked: /var/www/html /var/www /usr/share/nginx/html"
              exit 1
            fi

            # IMPORTANT: whitelist the repo BEFORE running any git commands
            git config --global --add safe.directory "$(pwd)"

            # Now git commands are safe
            git rev-parse --is-inside-work-tree
            git status --porcelain=v1 || true
            git pull origin main
          '

      - name: Reload nginx (optional)
        run: |
          # Reload nginx inside your actual container, if nginx exists there.
          # If your container doesn't have nginx binary, this will be ignored.
          docker exec Static_site sh -lc 'nginx -t && nginx -s reload' || true